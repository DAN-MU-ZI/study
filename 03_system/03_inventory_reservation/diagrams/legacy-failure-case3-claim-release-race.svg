<polyline class="edge" data-from="C" data-to="E" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="329.506,211.60000000000002 329.506,267.6" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="D" data-to="F" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="127.8845,304.5 127.8845,332.5 228.69525,332.5 228.69525,360.5" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="E" data-to="F" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="329.506,304.5 329.506,332.5 228.69525,332.5 228.69525,360.5" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
