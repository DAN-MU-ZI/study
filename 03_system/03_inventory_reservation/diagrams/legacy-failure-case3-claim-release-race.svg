</g>
<g class="node" data-id="G" data-label="중복 차감 또는 중복 복구 위험" data-shape="rectangle">
  <rect x="113.24275" y="453.4" width="230.905" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="228.69525" y="471.84999999999997" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">중복 차감 또는 중복 복구 위험</text>
</g>
</svg>