<g class="node" data-id="A" data-label="Reserved 상태
same reservation_id" data-shape="rectangle">
  <rect x="147.32874999999999" y="48" width="162.73300000000003" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="228.69525" y="74.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="228.69525" dy="-3.9000000000000012">Reserved 상태</tspan><tspan x="228.69525" dy="16.900000000000002">same reservation_id</tspan></text>
