  <text x="329.506" y="184.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="329.506" dy="-3.9000000000000012">TTL expiry</tspan><tspan x="329.506" dy="16.900000000000002">Release 시도</tspan></text>
