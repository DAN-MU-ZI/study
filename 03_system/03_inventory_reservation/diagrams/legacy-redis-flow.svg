<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 585.133 572" width="585.133" height="572" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="alt" data-label="결제 성공">
  <rect x="30" y="198" width="525.133" height="324" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="198" width="92.88999999999999" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="207" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [결제 성공]</text>
  <line x1="30" y1="394" x2="555.133" y2="394" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
  <text x="38" y="408" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">[결제 실패 또는 만료]</text>
</g>
<line class="lifeline" data-actor="Checkout" x1="85.13300000000001" y1="70" x2="85.13300000000001" y2="542" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Redis" x1="225.133" y1="70" x2="225.133" y2="542" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Payment" x1="365.13300000000004" y1="70" x2="365.13300000000004" y2="542" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="MySQL" x1="505.13300000000004" y1="70" x2="505.13300000000004" y2="542" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Checkout" data-to="Redis" data-label="Reserve: available quantity 차감" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="90" x2="225.133" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.133" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Reserve: available quantity 차감</text>
</g>
<g class="message" data-from="Redis" data-to="Checkout" data-label="reservation id + TTL 저장" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="225.133" y1="130" x2="85.13300000000001" y2="130" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="155.133" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">reservation id + TTL 저장</text>
</g>
<g class="message" data-from="Checkout" data-to="Payment" data-label="결제 요청" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="170" x2="365.13300000000004" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="225.13300000000004" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">결제 요청</text>
</g>
<g class="message" data-from="Payment" data-to="Checkout" data-label="success" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="365.13300000000004" y1="238" x2="85.13300000000001" y2="238" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="225.13300000000004" y="228" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">success</text>
</g>
<g class="message" data-from="Checkout" data-to="MySQL" data-label="Claim: inventory ledger 차감" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="278" x2="505.13300000000004" y2="278" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.13300000000004" y="268" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Claim: inventory ledger 차감</text>
</g>
<g class="message" data-from="MySQL" data-to="Checkout" data-label="commit" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="505.13300000000004" y1="318" x2="85.13300000000001" y2="318" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="295.13300000000004" y="308" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">commit</text>
</g>
<g class="message" data-from="Checkout" data-to="Redis" data-label="reservation 정리" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="358" x2="225.133" y2="358" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.133" y="348" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">reservation 정리</text>
</g>
<g class="message" data-from="Payment" data-to="Checkout" data-label="fail or timeout" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="365.13300000000004" y1="422" x2="85.13300000000001" y2="422" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="225.13300000000004" y="412" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">fail or timeout</text>
</g>
<g class="message" data-from="Checkout" data-to="Redis" data-label="Release: available quantity 복구" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="462" x2="225.133" y2="462" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.133" y="452" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Release: available quantity 복구</text>
</g>
<g class="message" data-from="Checkout" data-to="Redis" data-label="reservation 삭제 또는 만료" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.13300000000001" y1="502" x2="225.133" y2="502" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.133" y="492" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">reservation 삭제 또는 만료</text>
</g>
<g class="actor" data-id="Checkout" data-label="Checkout" data-type="participant">
  <rect x="40.00000000000001" y="30" width="90.266" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="85.13300000000001" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Checkout</text>
</g>
<g class="actor" data-id="Redis" data-label="Redis" data-type="participant">
  <rect x="185.133" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="225.133" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Redis</text>
</g>
<g class="actor" data-id="Payment" data-label="Payment" data-type="participant">
  <rect x="322.96400000000006" y="30" width="84.338" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="365.13300000000004" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Payment</text>
</g>
<g class="actor" data-id="MySQL" data-label="MySQL" data-type="participant">
  <rect x="465.13300000000004" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="505.13300000000004" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">MySQL</text>
</g>
</svg>