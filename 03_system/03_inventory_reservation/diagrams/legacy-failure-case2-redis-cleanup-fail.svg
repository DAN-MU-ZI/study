<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 624.5969999999999 402" width="624.5969999999999" height="402" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="API" x1="87.375" y1="70" x2="87.375" y2="372" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Redis" x1="227.375" y1="70" x2="227.375" y2="372" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="DB" x1="370.292" y1="70" x2="370.292" y2="372" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Worker" x1="533.9029999999999" y1="70" x2="533.9029999999999" y2="372" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="API" data-to="Redis" data-label="Reserve 성공" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="87.375" y1="90" x2="227.375" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="157.375" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Reserve 성공</text>
</g>
<g class="message" data-from="Redis" data-to="API" data-label="available 감소, reservation TTL 저장" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="227.375" y1="130" x2="87.375" y2="130" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="157.375" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">available 감소, reservation TTL 저장</text>
</g>
<g class="message" data-from="API" data-to="DB" data-label="Claim 성공" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="87.375" y1="170" x2="370.292" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="228.8335" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Claim 성공</text>
</g>
<g class="message" data-from="DB" data-to="API" data-label="ledger 차감 완료" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="370.292" y1="210" x2="87.375" y2="210" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="228.8335" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">ledger 차감 완료</text>
</g>
<g class="message" data-from="API" data-to="Redis" data-label="reservation 정리 실패" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="87.375" y1="250" x2="227.375" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="157.375" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">reservation 정리 실패</text>
</g>
<g class="message" data-from="Worker" data-to="Redis" data-label="TTL 만료 후 Release 처리" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="533.9029999999999" y1="290" x2="227.375" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="380.63899999999995" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">TTL 만료 후 Release 처리</text>
</g>
<g class="note" data-position="over" data-actors="Redis,DB">
  <polygon points="171.96050000000002,298 419.7065,298 425.7065,304 425.7065,321 171.96050000000002,321" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="419.7065,298 425.7065,304 419.7065,304" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="298.8335" y="309.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">판매된 재고가 Redis에서 다시 복구될 수 있음</text>
</g>
<g class="note" data-position="over" data-actors="API">
  <polygon points="30,325 138.75,325 144.75,331 144.75,348 30,348" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="138.75,325 144.75,331 138.75,331" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="87.375" y="336.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">결과: 오버셀 위험</text>
</g>
<g class="actor" data-id="API" data-label="Checkout API" data-type="participant">
  <rect x="30.756500000000003" y="30" width="113.237" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="87.375" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Checkout API</text>
</g>
<g class="actor" data-id="Redis" data-label="Redis" data-type="participant">
  <rect x="187.375" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="227.375" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Redis</text>
</g>
<g class="actor" data-id="DB" data-label="MySQL Ledger" data-type="participant">
  <rect x="307.375" y="30" width="125.834" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="370.292" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">MySQL Ledger</text>
</g>
<g class="actor" data-id="Worker" data-label="Expiry Worker" data-type="participant">
  <rect x="473.2089999999999" y="30" width="121.388" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="533.9029999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Expiry Worker</text>
</g>
</svg>