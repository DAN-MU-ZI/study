<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 832.818 363.6" width="832.818" height="363.6" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="WAIT" data-label="FOR UPDATE">
  <rect x="48" y="48" width="736.818" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="48" y="48" width="736.818" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="60" y="62" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">FOR UPDATE</text>
</g>
<g class="subgraph" data-id="SKIP" data-label="FOR UPDATE SKIP LOCKED">
  <rect x="48" y="201.8" width="663.459" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="48" y="201.8" width="663.459" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="60" y="215.8" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">FOR UPDATE SKIP LOCKED</text>
</g>
<polyline class="edge" data-from="W1" data-to="W2" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="165.971,118.9 221.971,118.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="W2" data-to="W3" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="332.834,118.9 388.834,118.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="W3" data-to="W4" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="577.502,118.9 633.502,118.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="S1" data-to="S2" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="165.971,272.70000000000005 221.971,272.70000000000005" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="S2" data-to="S3" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="332.834,272.70000000000005 388.834,272.70000000000005" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="S3" data-to="S4" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="535.265,272.70000000000005 591.265,272.70000000000005" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="W1" data-label="Session A
unit 1 lock" data-shape="rectangle">
  <rect x="64" y="92" width="101.971" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="114.9855" y="118.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="114.9855" dy="-3.9000000000000012">Session A</tspan><tspan x="114.9855" dy="16.900000000000002">unit 1 lock</tspan></text>
</g>
<g class="node" data-id="W2" data-label="Session B
same query" data-shape="rectangle">
  <rect x="221.971" y="92" width="110.863" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="277.40250000000003" y="118.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="277.40250000000003" dy="-3.9000000000000012">Session B</tspan><tspan x="277.40250000000003" dy="16.900000000000002">same query</tspan></text>
</g>
<g class="node" data-id="W3" data-label="unit 1 lock 해제까지 대기" data-shape="rectangle">
  <rect x="388.834" y="100.45" width="188.668" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="483.168" y="118.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">unit 1 lock 해제까지 대기</text>
</g>
<g class="node" data-id="W4" data-label="예약 처리 지연" data-shape="rectangle">
  <rect x="633.502" y="100.45" width="135.316" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="701.16" y="118.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">예약 처리 지연</text>
</g>
<g class="node" data-id="S1" data-label="Session A
unit 1 lock" data-shape="rectangle">
  <rect x="64" y="245.8" width="101.971" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="114.9855" y="272.7" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="114.9855" dy="-3.9000000000000012">Session A</tspan><tspan x="114.9855" dy="16.900000000000002">unit 1 lock</tspan></text>
</g>
<g class="node" data-id="S2" data-label="Session B
same query" data-shape="rectangle">
  <rect x="221.971" y="245.8" width="110.863" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="277.40250000000003" y="272.7" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="277.40250000000003" dy="-3.9000000000000012">Session B</tspan><tspan x="277.40250000000003" dy="16.900000000000002">same query</tspan></text>
</g>
<g class="node" data-id="S3" data-label="잠긴 unit 1 건너뜀" data-shape="rectangle">
  <rect x="388.834" y="254.25" width="146.43099999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="462.04949999999997" y="272.7" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">잠긴 unit 1 건너뜀</text>
</g>
<g class="node" data-id="S4" data-label="unit 2 확보" data-shape="rectangle">
  <rect x="591.265" y="254.25" width="104.19399999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="643.362" y="272.7" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">unit 2 확보</text>
</g>
</svg>