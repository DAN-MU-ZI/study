<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 503.601 282" width="503.601" height="282" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="API" x1="127.76700000000001" y1="70" x2="127.76700000000001" y2="252" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Redis" x1="267.767" y1="70" x2="267.767" y2="252" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="DB" x1="410.68399999999997" y1="70" x2="410.68399999999997" y2="252" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="API" data-to="Redis" data-label="Reserve 성공" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="127.76700000000001" y1="90" x2="267.767" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="197.767" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Reserve 성공</text>
</g>
<g class="message" data-from="Redis" data-to="API" data-label="available 감소, reservation TTL 저장" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="267.767" y1="130" x2="127.76700000000001" y2="130" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="197.767" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">available 감소, reservation TTL 저장</text>
</g>
<g class="message" data-from="API" data-to="DB" data-label="Claim 실패" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="127.76700000000001" y1="170" x2="410.68399999999997" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="269.2255" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Claim 실패</text>
</g>
<g class="note" data-position="over" data-actors="Redis,DB">
  <polygon points="205.5215,178 466.9295,178 472.9295,184 472.9295,201 205.5215,201" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="466.9295,178 472.9295,184 466.9295,184" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="339.2255" y="189.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Redis 예약이 남아 판매 가능 재고만 줄어든 상태</text>
</g>
<g class="note" data-position="over" data-actors="API">
  <polygon points="30,205 219.53400000000002,205 225.53400000000002,211 225.53400000000002,228 30,228" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="219.53400000000002,205 225.53400000000002,211 219.53400000000002,211" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="127.76700000000001" y="216.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">결과: 언더셀 위험(예약 잔존 구간)</text>
</g>
<g class="actor" data-id="API" data-label="Checkout API" data-type="participant">
  <rect x="71.14850000000001" y="30" width="113.237" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="127.76700000000001" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Checkout API</text>
</g>
<g class="actor" data-id="Redis" data-label="Redis" data-type="participant">
  <rect x="227.767" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="267.767" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Redis</text>
</g>
<g class="actor" data-id="DB" data-label="MySQL Ledger" data-type="participant">
  <rect x="347.76699999999994" y="30" width="125.834" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="410.68399999999997" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">MySQL Ledger</text>
</g>
</svg>