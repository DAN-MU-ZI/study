services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"

  backend-test:
    image: gradle:8.5-jdk17
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    command: >
      bash -lc "gradle test --no-daemon"

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend
    ports:
      - "4173:4173"
